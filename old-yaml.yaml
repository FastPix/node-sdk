        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
            example: 10
          description: Limit specifies the maximum number of items to display per page.
      responses:
        "200":
          description: DRM configuration(s) retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
