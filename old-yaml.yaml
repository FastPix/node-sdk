                  totalRecords: 1
                  currentOffset: 1
                  offsetCount: 1
        "default":
          description: See the range of possible <a href="https://docs.fastpix.com/reference/error-codes">error</a> responses and their status codes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Default-Error"
  /on-demand/drm-configurations/{drmConfigurationId}:
