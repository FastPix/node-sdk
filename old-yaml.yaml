                        accessPolicy: public
                        accessRestrictions:
                          domains:
                            defaultPolicy: allow
                            allow: []
                            deny: []
                          userAgents:
                            defaultPolicy: allow
                            allow: []
                            deny: []
                    tracks:
                      - id: 344fd5bc-82af-4d11-bc1c-785d9e6f9aef
                        type: video
                        width: 1920
